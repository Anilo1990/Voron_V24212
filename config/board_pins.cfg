[board_pins mcu]
aliases:

    # steppers
	X_STEP=PF13 ,  X_DIR=PF12 ,  X_ENABLE=PF14 ,  X_TMCUART=PC4  , X_STOP=PG6,
	Y_STEP=PG0  ,  Y_DIR=PG1  ,  Y_ENABLE=PF15 ,  Y_TMCUART=PD11 , Y_STOP=PG9,

    Z_STEP=PF11 ,  Z_DIR=PG3  ,  Z_ENABLE=PG5  ,  Z_TMCUART=PC6  , Z_STOP=PG10,
	Z1_STEP=PG4 ,  Z1_DIR=PC1 ,  Z1_ENABLE=PA0 ,  Z1_TMCUART=PC7 ,
	Z2_STEP=PF9 ,  Z2_DIR=PF10,  Z2_ENABLE=PG2 ,  Z2_TMCUART=PF2 ,
	Z3_STEP=PC13,  Z3_DIR=PF0 ,  Z3_ENABLE=PF1 ,  Z3_TMCUART=PE4 ,

	E_STEP=PE2  ,  E_DIR=PE3  ,  E_ENABLE=PD4  ,  E_TMCUART=PE1  ,

    # hotend
	E_HEATER=PA2, E_TEMPERATURE=PF4, E_FAN=PE5,
	PART_FAN=PA8,

    # sensor
	CHAMBER_TEMPERATURE=PF5,
	ELECTRICAL_CABINET_TEMPERATURE=PF6,
    CHAMBER_TEMPERATURE2=PF7,

    # bed
	BED_HEATER=PA3, BED_TEMPERATURE=PF3, 

    # probe
	PROBE_INPUT=PG15,

    # fans
    BED_FAN_1=PD12,
    BED_FAN_2=PD13,
	BED_FAN_3=PD14,
    FILTER_FAN=PB10, #THE FILTER

    # motion_sensor
    MOTION_SENSOR=PG11,

    # light
	LIGHT_OUPUT=PD15,
	STATUS_NEOPIXEL=PB0,

    # EXP1 header
    EXP1_1=PE8  , EXP1_2=PE7,
    EXP1_3=PE9  , EXP1_4=PE10,
    EXP1_5=PE12 , EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14 , EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6  , EXP2_2=PA5,
    EXP2_3=PB1  , EXP2_4=PA4,
    EXP2_5=PB2  , EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15 , EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

[board_pins SB2040]
mcu: SB2040
aliases:

aliases_2209:
    EXT_EN=gpio7    ,  EXT_STEP=gpio9,
    EXT_DIR=gpio10  ,  EXT_UART=gpio8

aliases_endstop:
    LIMIT_0=gpio25  ,  LIMIT_1=gpio28,
    LIMIT_2=gpio29  

aliases_cnc_fans:
    PC_FAN=gpio13   ,  HO_FAN =gpio14,
    CAN_FAN=gpio15     

aliases_thermistors:
    TH0=gpio27      ,  TH1=gpio26

aliases_heaters:
    HE0=gpio6

aliases_rgb:
    RGBLED=gpio12

aliases_adxl:
    ADXL=gpio1