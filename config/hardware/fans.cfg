[fan] #Part cooling fan
pin: SB2040:PC_FAN
kick_start_time: 0.5
cycle_time: 0.010
off_below: 0.10

[controller_fan SB2040_Fan]
pin: SB2040:CAN_FAN
stepper: extruder

[heater_fan hotend_fan]
pin: SB2040:HO_FAN
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

[fan_generic BedFan1]
pin: BED_FAN_1
max_power: 0.5
kick_start_time: 0.5
shutdown_speed: 0.0
off_below: 0.1

[fan_generic BedFan2]
pin: BED_FAN_2
max_power: 0.5
kick_start_time: 0.5
shutdown_speed: 0.0
off_below: 0.1

[fan_generic BedFan3]
pin: BED_FAN_3
max_power: 0.5
kick_start_time: 0.5
shutdown_speed: 0.0
off_below: 0.1

[fan_generic filter]
pin: FILTER_FAN
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.1